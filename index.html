<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ローカル一元管理アプリ - Step 1（修正版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .date-selector { margin-bottom: 20px; font-weight: bold; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; font-size: 16px; background: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff3b30; padding: 5px 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-selector">
        <label for="currentDate">日付を選択：</label>
        <!-- 初期値をHTML側で直接 2026-05-16 に固定しました -->
        <input type="date" id="currentDate" value="2026-05-16">
    </div>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="タスクを入力...">
        <button onclick="addTask()">追加</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    let todoData = {};

    const dateInput = document.getElementById('currentDate');
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    function initApp() {
        // LocalStorageからデータを読み込む
        const savedData = localStorage.getItem('myLocalTodoApp');
        if (savedData) {
            todoData = JSON.parse(savedData);
        }
        
        // エラーの原因になりやすいJavaScript側での日付書き換えを廃止し、
        // HTMLに設定された日付（2026-05-16）をそのまま使うようにしました
        renderTasks();
    }

    function renderTasks() {
        const selectedDate = dateInput.value;
        taskList.innerHTML = ''; 

        // デバッグ用：現在選択されている日付をコンソールに表示
        console.log("現在選択されている日付:", selectedDate);

        if (todoData[selectedDate]) {
            todoData[selectedDate].forEach((taskText, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${taskText}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">削除</button>
                `;
                taskList.appendChild(li);
            });
        }
    }

    function addTask() {
        const selectedDate = dateInput.value;
        const text = taskInput.value.trim();
        
        if (text === '') return;

        if (!todoData[selectedDate]) {
            todoData[selectedDate] = [];
        }

        todoData[selectedDate].push(text);
        saveToLocalStorage();
        
        taskInput.value = '';
        renderTasks();
    }

    function deleteTask(index) {
        const selectedDate = dateInput.value;
        todoData[selectedDate].splice(index, 1);
        
        if (todoData[selectedDate].length === 0) {
            delete todoData[selectedDate];
        }

        saveToLocalStorage();
        renderTasks();
    }

    function saveToLocalStorage() {
        localStorage.setItem('myLocalTodoApp', JSON.stringify(todoData));
    }

    dateInput.addEventListener('change', renderTasks);

    initApp();
</script>

</body>
</html>
