<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ローカル一元管理アプリ - Step 3</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f5f5f5; color: #333; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* カレンダーのスタイル */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-bottom: 20px; }
        .weekday { font-size: 12px; font-weight: bold; color: #666; padding-bottom: 5px; }
        .day { padding: 10px 0; font-size: 14px; border-radius: 5px; cursor: pointer; position: relative; background: #f9f9f9; }
        .day:active { background: #eee; }
        .day.selected { background: #007aff; color: white; font-weight: bold; }
        .day.empty { background: transparent; cursor: default; }
        /* 記録（タスクや日記）がある日のドット */
        .has-record::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #34c759; border-radius: 50%; }
        .day.selected.has-record::after { background: white; }

        /* コンテンツセクション */
        .content-section { border-top: 2px solid #eee; padding-top: 15px; }
        .selected-date-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #007aff; }
        
        h3 { font-size: 14px; color: #666; margin: 15px 0 5px 0; border-left: 3px solid #007aff; padding-left: 8px; }

        /* 日記（自由記述欄）のスタイル */
        textarea { width: 100%; height: 80px; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; resize: none; font-family: sans-serif; }
        
        /* タスクのスタイル */
        .input-area { display: flex; gap: 10px; margin-bottom: 10px; margin-top: 5px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; font-size: 15px; background: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .save-btn { background: #34c759; width: 100%; margin-top: 5px; padding: 8px; font-size: 14px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .delete-btn { background: #ff3b30; padding: 3px 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <!-- カレンダー -->
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="calendarTitle">2026年5月</span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>

    <!-- 記録エリア -->
    <div class="content-section">
        <div class="selected-date-title" id="selectedDateTitle">選択された日付: -----</div>
        
        <!-- 日記・メモ欄 -->
        <h3>今日の日記・思考メモ</h3>
        <textarea id="diaryInput" placeholder="今日気づいたこと、残しておきたいこと..." oninput="saveDiary()"></textarea>

        <!-- タスク（やったこと）欄 -->
        <h3>タスク・実績</h3>
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="タスクを入力...">
            <button onclick="addTask()">追加</button>
        </div>
        <ul id="taskList"></ul>
    </div>
</div>

<script>
    // データの持ち方を拡張
    // 構造のイメージ:
    // todoData = {
    //    "2026-05-16": {
    //        diary: "ここに日記の文章が入る",
    //        tasks: ["タスク1", "タスク2"]
    //    }
    // };
    let todoData = {};
    
    let currentDisplayDate = new Date(); 
    let selectedDateStr = "";

    const calendarTitle = document.getElementById('calendarTitle');
    const calendarGrid = document.getElementById('calendarGrid');
    const selectedDateTitle = document.getElementById('selectedDateTitle');
    const diaryInput = document.getElementById('diaryInput');
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    function initApp() {
        const savedData = localStorage.getItem('myLocalTodoApp');
        if (savedData) {
            todoData = JSON.parse(savedData);
        }
        
        // 過去の古いデータ構造（配列だった場合）からの移行ケア
        for (let key in todoData) {
            if (Array.isArray(todoData[key])) {
                todoData[key] = { diary: "", tasks: todoData[key] };
            }
        }

        selectedDateStr = formatDate(new Date());
        renderCalendar();
        renderActiveDateData();
    }

    function formatDate(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const d = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function renderCalendar() {
        calendarGrid.innerHTML = '';
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        
        calendarTitle.innerText = `${year}年${month + 1}月`;

        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        weekdays.forEach(w => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = w;
            calendarGrid.appendChild(div);
        });

        const firstDayOfMonth = new Date(year, month, 1);
        const startWeekday = firstDayOfMonth.getDay();
        const lastDayOfMonth = new Date(year, month + 1, 0);
        const totalDays = lastDayOfMonth.getDate();

        for (let i = 0; i < startWeekday; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'day empty';
            calendarGrid.appendChild(emptyDiv);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            dayDiv.innerText = day;

            const thisDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

            if (thisDateStr === selectedDateStr) {
                dayDiv.classList.add('selected');
            }

            // 日記がある、またはタスクがある場合にカレンダーに緑のドットを表示
            const dayData = todoData[thisDateStr];
            if (dayData && ((dayData.diary && dayData.diary.trim() !== "") || (dayData.tasks && dayData.tasks.length > 0))) {
                dayDiv.classList.add('has-record');
            }

            dayDiv.onclick = () => {
                selectedDateStr = thisDateStr;
                renderCalendar();
                renderActiveDateData();
            };

            calendarGrid.appendChild(dayDiv);
        }
    }

    // 選択された日付のすべてのデータ（日記 ＋ タスク）を描画する
    function renderActiveDateData() {
        selectedDateTitle.innerText = `選択された日付: ${selectedDateStr}`;
        
        // 1. 日記の読み込み
        if (todoData[selectedDateStr] && todoData[selectedDateStr].diary) {
            diaryInput.value = todoData[selectedDateStr].diary;
        } else {
            diaryInput.value = ''; // データがなければ空にする
        }

        // 2. タスクリストの読み込み
        taskList.innerHTML = '';
        if (todoData[selectedDateStr] && todoData[selectedDateStr].tasks) {
            todoData[selectedDateStr].tasks.forEach((taskText, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${taskText}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">削除</button>
                `;
                taskList.appendChild(li);
            });
        }
    }

    // 日記を入力するたびに自動保存する（ボタンを押さなくても保存される仕様）
    function saveDiary() {
        prepareDateKey();
        todoData[selectedDateStr].diary = diaryInput.value;
        
        // 文字数がゼロ、かつタスクも空ならオブジェクトを綺麗にする
        cleanEmptyKey();
        
        saveToLocalStorage();
        // カレンダーのドットの有無をリアルタイムに更新するため、カレンダーのみリライト
        // ただし入力中のカーソルが外れないよう、文字入力時はクラスの付け替えだけにするのが理想ですが、今回はシンプルに再描画します
        renderCalendar(); 
    }

    // タスクを追加
    function addTask() {
        const text = taskInput.value.trim();
        if (text === '') return;

        prepareDateKey();
        todoData[selectedDateStr].tasks.push(text);
        
        saveToLocalStorage();
        taskInput.value = '';
        renderCalendar();
        renderActiveDateData();
    }

    // タスクを削除
    function deleteTask(index) {
        if (todoData[selectedDateStr] && todoData[selectedDateStr].tasks) {
            todoData[selectedDateStr].tasks.splice(index, 1);
            cleanEmptyKey();
            saveToLocalStorage();
            renderCalendar();
            renderActiveDateData();
        }
    }

    // 指定された日付のデータ枠を安全に用意するヘルパー
    function prepareDateKey() {
        if (!todoData[selectedDateStr]) {
            todoData[selectedDateStr] = { diary: "", tasks: [] };
        }
    }

    // 中身が完全に空になった日付のデータを削除して容量を節約するヘルパー
    function cleanEmptyKey() {
        const data = todoData[selectedDateStr];
        if (data) {
            const hasNoDiary = !data.diary || data.diary.trim() === "";
            const hasNoTasks = !data.tasks || data.tasks.length === 0;
            if (hasNoDiary && hasNoTasks) {
                delete todoData[selectedDateStr];
            }
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('myLocalTodoApp', JSON.stringify(todoData));
    }

    function changeMonth(offset) {
        currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
        renderCalendar();
    }

    initApp();
</script>

</body>
</html>
